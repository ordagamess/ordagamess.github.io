<svg xmlns="http://www.w3.org/2000/svg" width="600" height="700" viewBox="0 0 600 700">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0d1325"/>
    <stop offset="100%" stop-color="#8ef2c2"/>
  </linearGradient>
</defs>

<rect width="600" height="700" fill="url(#bg)"/>

<!-- Avatar circles -->
<circle cx="300" cy="260" r="140" fill="rgba(255,255,255,0.18)"/>
<circle cx="300" cy="250" r="118" fill="rgba(255,255,255,0.1)"/>

<!-- Initial -->
<text x="300" y="295" text-anchor="middle" fill="white" font-size="130" font-family="Arial, Helvetica, sans-serif" font-weight="700">D</text>

<!-- Info card -->
<rect x="48" y="500" width="504" height="150" rx="24" fill="rgba(10,10,20,0.28)" stroke="rgba(255,255,255,0.22)"/>

<!-- Name -->
<text x="300" y="545" text-anchor="middle" fill="white" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="600">
  Damir Anvarbek
</text>

<!-- Role -->
<text x="300" y="585" text-anchor="middle" fill="white" font-size="20" font-family="Arial, Helvetica, sans-serif">
  Founder & Lead Developer
</text>

<!-- Studio -->
<text x="300" y="630" text-anchor="middle" fill="#8ef2c2" font-size="18" font-family="Arial, Helvetica, sans-serif" letter-spacing="6">
  ORDA GAMES
</text>

</svg>
